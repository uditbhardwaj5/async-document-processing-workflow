services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_NAME: ${APP_NAME}
      DEBUG: ${DEBUG}
      API_PREFIX: ${API_PREFIX}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      REDIS_PROGRESS_CHANNEL: ${REDIS_PROGRESS_CHANNEL}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads_data:/app/uploads

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker -l info
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_NAME: ${APP_NAME}
      DEBUG: ${DEBUG}
      API_PREFIX: ${API_PREFIX}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      REDIS_PROGRESS_CHANNEL: ${REDIS_PROGRESS_CHANNEL}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB}
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
